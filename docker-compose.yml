version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: auth-db-container
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    image: simple-auth-app:v3
    container_name: my-auth-container
    ports:
      - "8080:5000"
    environment:
      DB_HOST: db
      DB_NAME: authdb
      DB_USER: postgres
      DB_PASSWORD: secret_password
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
