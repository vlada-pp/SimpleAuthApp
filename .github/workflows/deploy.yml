name: Deploy to Cloud Run
on:
  push:
    branches: [main]

env:
  PROJECT_ID: simpleauthapp-382716
  REGION: europe-west1
  SERVICE_NAME: simple-auth-app
  IMAGE: europe-west1-docker.pkg.dev/simpleauthapp-382716/apps/simple-auth-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} .
          docker push ${{ env.IMAGE }}:${{ github.sha }}

      - run: gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image=${{ env.IMAGE }}:${{ github.sha}} \
          --region=${{ env.REGION }} --memory=512Mi
